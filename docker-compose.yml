services:
  mysql:
    image: mysql:8.0
    container_name: gtodo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-gtodo_root_123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gtodo}
      MYSQL_USER: ${MYSQL_USER:-gtodo}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gtodo_pass_123}
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mysql_data:
